  <!-- Center talon -->
  <path 
    d="M 50 32 L 50 72" 
    stroke="#06b6d4" 
    stroke-width="4.5" 
    stroke-linecap="round" 
    fill="none"
  />
  <!-- Right talon -->
  <path 
    d="M 66 38 Q 70 55 62 72" 
